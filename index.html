<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIDI Merger</title>
<style>
  /* Dark theme + monospace font */
  body {
    background-color: #121212;
    color: #e0e0e0;
    font-family: "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    padding-top: 50px;
  }

  h3 {
    color: #ffffff;
    margin-bottom: 20px;
  }

  /* Center file input and button */
  input[type="file"], 
  button {
      display: block;
      margin: 10px auto;
      color: #e0e0e0; /* ensures text in file input is visible */
      font-family: "Consolas", monospace;
  }

  /* Button styling */
  button {
    background-color: #1f1f1f;
    border: 1px solid #444;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    transition: all 0.2s ease;
  }

  button:hover { background-color: #2a2a2a; border-color: #666; }
  button:active { background-color: #333; }

  /* Responsive for small screens */
  @media (max-width: 500px) {
    body { padding: 20px; }
    button { width: 100%; }
  }
</style>
</head>
<body>

<h3>MIDI Merger</h3>
<input type="file" id="files" multiple accept=".mid,.midi">
<button onclick="mergeMidi()">Merge & Download</button>

<script type="module">
import { parseMidi, writeMidi } from "https://cdn.jsdelivr.net/npm/midi-file@1.2.4/+esm";

window.mergeMidi = async function () {
  try {
    const files = document.getElementById("files").files;
    if (!files.length) {
      alert("Select MIDI files.");
      return;
    }

    const parsed = [];
    const names = [];

    for (let f of files) {
      const buf = await f.arrayBuffer();
      parsed.push(parseMidi(new Uint8Array(buf)));
      names.push(f.name.replace(".mid",""));
    }

    const ticksPerBeat = parsed[0].header.ticksPerBeat;

    const globalTrack = [];
    const outputTracks = [];
    let channel = 0;

    function rebuild(track) {
      track.sort((a,b)=>a.time-b.time);
      let last = 0;
      return track.map(e=>{
        const delta = e.time - last;
        last = e.time;
        delete e.time;
        return {...e, deltaTime: delta};
      });
    }

    parsed.forEach((midi, fileIndex)=>{

      midi.tracks.forEach((track, tIndex)=>{

        let time = 0;
        let newTrack = [];
        let name = null;

        track.forEach(event=>{
          time += event.deltaTime;

          const e = structuredClone(event);

          if (e.meta && e.type === "trackName") {
            name = e.text;
          }

          if (e.meta && (
            e.type === "setTempo" ||
            e.type === "timeSignature" ||
            e.type === "keySignature"
          )) {
            if (fileIndex === 0 && tIndex === 0) {
              globalTrack.push({...e, time});
            }
            return;
          }

          if (e.channel !== undefined) {
            e.channel = channel % 16;
          }

          newTrack.push({...e, time});
        });

        if (!name) {
          name = names[fileIndex] + "_Track_" + (tIndex+1);
        }

        newTrack.push({
          time: 0,
          meta: true,
          type: "trackName",
          text: name
        });

        newTrack = rebuild(newTrack);

        newTrack.push({
          deltaTime: 0,
          meta: true,
          type: "endOfTrack"
        });

        outputTracks.push(newTrack);
        channel++;
      });
    });

    const finalGlobal = rebuild(globalTrack);
    finalGlobal.unshift({
      deltaTime: 0,
      meta: true,
      type: "trackName",
      text: "Global"
    });
    finalGlobal.push({
      deltaTime: 0,
      meta: true,
      type: "endOfTrack"
    });

    const finalMidi = {
      header: {
        format: 1,
        numTracks: outputTracks.length + 1,
        ticksPerBeat
      },
      tracks: [finalGlobal, ...outputTracks]
    };

    const bytes = writeMidi(finalMidi);
    const blob = new Blob([new Uint8Array(bytes)], {type:"audio/midi"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.mid";
    a.click();

  } catch (e) {
    console.error(e);
    alert("Error — check console (F12)");
  }
};
</script>

</body>
</html>
