<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIDI Merger</title>

<style>
  body {
    background-color: #1b140f; /* deep brown */
    color: #e6d3b3;
    font-family: "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    margin: 0;
    padding-top: 80px;
    overflow: hidden;
  }

  h3 {
    color: #f2e6d0;
    margin-bottom: 30px;
  }

  .center-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  input, button {
    font-family: "Consolas", monospace;
    background: #3a2a1f;
    color: #e6d3b3;
    border: 1px solid #5a3e2b;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
  }

  button {
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #4a3426;
  }

  /* 🌱 VINES */
  .vine {
    position: absolute;
    width: 120px;
    height: 100%;
    top: 0;
    pointer-events: none;
    opacity: 0.6;
  }

  .vine.left {
    left: 0;
  }

  .vine.right {
    right: 0;
    transform: scaleX(-1);
  }

  .vine span {
    position: absolute;
    width: 6px;
    height: 80px;
    background: linear-gradient(#2f7a3e, #1f5a2a);
    border-radius: 10px;
    animation: grow 6s linear infinite;
  }

  .vine span:nth-child(1) { left: 20px; animation-delay: 0s; }
  .vine span:nth-child(2) { left: 50px; animation-delay: 2s; }
  .vine span:nth-child(3) { left: 80px; animation-delay: 4s; }

  @keyframes grow {
    0% { top: 100%; height: 0; }
    100% { top: -100px; height: 200px; }
  }

  /* 🎹 PIXEL PIANO */
  .piano {
    margin-top: 50px;
    display: flex;
    gap: 2px;
  }

  .key {
    width: 16px;
    height: 60px;
    background: #f5f0e6;
    border: 1px solid #000;
  }

  .key.black {
    width: 10px;
    height: 40px;
    background: #111;
    margin-left: -8px;
    margin-right: -8px;
    z-index: 2;
    position: relative;
  }

</style>
</head>

<body>

<!-- Vines -->
<div class="vine left">
  <span></span><span></span><span></span>
</div>

<div class="vine right">
  <span></span><span></span><span></span>
</div>

<h3>MIDI Merger</h3>

<div class="center-column">
  <input type="file" id="files" multiple accept=".mid,.midi">
  <button onclick="mergeMidi()">Merge & Download</button>
</div>

<!-- Pixel piano -->
<div class="piano">
  <div class="key"></div>
  <div class="key black"></div>
  <div class="key"></div>
  <div class="key black"></div>
  <div class="key"></div>
  <div class="key"></div>
  <div class="key black"></div>
  <div class="key"></div>
</div>

<script type="module">
import { parseMidi, writeMidi } from "https://cdn.jsdelivr.net/npm/midi-file@1.2.4/+esm";

window.mergeMidi = async function () {
  try {
    const files = document.getElementById("files").files;
    if (!files.length) {
      alert("Select MIDI files.");
      return;
    }

    const parsed = [];
    const names = [];

    for (let f of files) {
      const buf = await f.arrayBuffer();
      parsed.push(parseMidi(new Uint8Array(buf)));
      names.push(f.name.replace(".mid",""));
    }

    const ticksPerBeat = parsed[0].header.ticksPerBeat;

    const globalTrack = [];
    const outputTracks = [];
    let channel = 0;

    function rebuild(track) {
      track.sort((a,b)=>a.time-b.time);
      let last = 0;
      return track.map(e=>{
        const delta = e.time - last;
        last = e.time;
        delete e.time;
        return {...e, deltaTime: delta};
      });
    }

    parsed.forEach((midi, fileIndex)=>{

      midi.tracks.forEach((track, tIndex)=>{

        let time = 0;
        let newTrack = [];
        let name = null;

        track.forEach(event=>{
          time += event.deltaTime;
          const e = structuredClone(event);

          if (e.meta && e.type === "trackName") name = e.text;

          if (e.meta && (
            e.type === "setTempo" ||
            e.type === "timeSignature" ||
            e.type === "keySignature"
          )) {
            if (fileIndex === 0 && tIndex === 0) {
              globalTrack.push({...e, time});
            }
            return;
          }

          if (e.channel !== undefined) e.channel = channel % 16;

          newTrack.push({...e, time});
        });

        if (!name) name = names[fileIndex] + "_Track_" + (tIndex+1);

        newTrack.push({ time: 0, meta: true, type: "trackName", text: name });

        newTrack = rebuild(newTrack);

        const totalTime = newTrack.reduce((sum, e) => sum + e.deltaTime, 0);
        newTrack.totalTime = totalTime;

        outputTracks.push(newTrack);
        channel++;
      });
    });

    let maxTime = 0;
    outputTracks.forEach(t => { if (t.totalTime > maxTime) maxTime = t.totalTime; });

    outputTracks.forEach(track => {
      const current = track.reduce((sum, e) => sum + e.deltaTime, 0);
      track.push({
        deltaTime: Math.max(0, maxTime - current),
        meta: true,
        type: "endOfTrack"
      });
    });

    const finalGlobal = rebuild(globalTrack);
    finalGlobal.unshift({ deltaTime: 0, meta: true, type: "trackName", text: "Global" });
    finalGlobal.push({ deltaTime: maxTime, meta: true, type: "endOfTrack" });

    const finalMidi = {
      header: { format: 1, numTracks: outputTracks.length + 1, ticksPerBeat },
      tracks: [finalGlobal, ...outputTracks]
    };

    const bytes = writeMidi(finalMidi);
    const blob = new Blob([new Uint8Array(bytes)], {type:"audio/midi"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.mid";
    a.click();

  } catch (e) {
    console.error(e);
    alert("Error — check console (F12)");
  }
};
</script>

</body>
</html>
