<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIDI Merger</title>

<style>
  body {
    background-color: #121212;
    color: #e0e0e0;
    font-family: "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;   /* center horizontally */
    justify-content: flex-start; /* push content to top */
    height: 100vh;
    margin: 0;
    padding-top: 80px; /* pushes content slightly down from top */
    overflow: hidden;
  }

  h3 {
    color: #ffffff;
    margin-bottom: 30px;
  }

  .center-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  input, button {
    font-family: "Consolas", monospace;
    background: #1f1f1f;
    color: #e0e0e0;
    border: 1px solid #444;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
  }

  button {
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2a2a2a;
  }

  /* --- Piano GIF --- */
  .piano {
    margin-top: 40px;
    opacity: 0.9;
  }

  .piano img {
    width: 120px;
  }

  /* --- Vine decorations --- */
  .vine-left, .vine-right {
    position: absolute;
    top: 0;
    width: 150px;
    opacity: 0.4;
    pointer-events: none;
  }

  .vine-left {
    left: 0;
  }

  .vine-right {
    right: 0;
    transform: scaleX(-1);
  }

</style>
</head>

<body>

<!-- Vines -->
<img class="vine-left" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Vine_PNG.png">
<img class="vine-right" src="https://upload.wikimedia.org/wikipedia/commons/3/3f/Vine_PNG.png">

<h3>MIDI Merger</h3>

<div class="center-column">
  <input type="file" id="files" multiple accept=".mid,.midi">
  <button onclick="mergeMidi()">Merge & Download</button>
</div>

<!-- Piano GIF -->
<div class="piano">
  <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="piano gif">
</div>

<script type="module">
import { parseMidi, writeMidi } from "https://cdn.jsdelivr.net/npm/midi-file@1.2.4/+esm";

window.mergeMidi = async function () {
  try {
    const files = document.getElementById("files").files;
    if (!files.length) {
      alert("Select MIDI files.");
      return;
    }

    const parsed = [];
    const names = [];

    for (let f of files) {
      const buf = await f.arrayBuffer();
      parsed.push(parseMidi(new Uint8Array(buf)));
      names.push(f.name.replace(".mid",""));
    }

    const ticksPerBeat = parsed[0].header.ticksPerBeat;

    const globalTrack = [];
    const outputTracks = [];
    let channel = 0;

    function rebuild(track) {
      track.sort((a,b)=>a.time-b.time);
      let last = 0;
      return track.map(e=>{
        const delta = e.time - last;
        last = e.time;
        delete e.time;
        return {...e, deltaTime: delta};
      });
    }

    parsed.forEach((midi, fileIndex)=>{

      midi.tracks.forEach((track, tIndex)=>{

        let time = 0;
        let newTrack = [];
        let name = null;

        track.forEach(event=>{
          time += event.deltaTime;

          const e = structuredClone(event);

          if (e.meta && e.type === "trackName") {
            name = e.text;
          }

          if (e.meta && (
            e.type === "setTempo" ||
            e.type === "timeSignature" ||
            e.type === "keySignature"
          )) {
            if (fileIndex === 0 && tIndex === 0) {
              globalTrack.push({...e, time});
            }
            return;
          }

          if (e.channel !== undefined) {
            e.channel = channel % 16;
          }

          newTrack.push({...e, time});
        });

        if (!name) {
          name = names[fileIndex] + "_Track_" + (tIndex+1);
        }

        newTrack.push({
          time: 0,
          meta: true,
          type: "trackName",
          text: name
        });

        newTrack = rebuild(newTrack);

        const totalTime = newTrack.reduce((sum, e) => sum + e.deltaTime, 0);
        newTrack.totalTime = totalTime;

        outputTracks.push(newTrack);
        channel++;
      });
    });

    let maxTime = 0;
    outputTracks.forEach(t => {
      if (t.totalTime > maxTime) maxTime = t.totalTime;
    });

    outputTracks.forEach(track => {
      const current = track.reduce((sum, e) => sum + e.deltaTime, 0);
      const remaining = maxTime - current;

      track.push({
        deltaTime: remaining > 0 ? remaining : 0,
        meta: true,
        type: "endOfTrack"
      });
    });

    const finalGlobal = rebuild(globalTrack);
    finalGlobal.unshift({
      deltaTime: 0,
      meta: true,
      type: "trackName",
      text: "Global"
    });
    finalGlobal.push({
      deltaTime: maxTime,
      meta: true,
      type: "endOfTrack"
    });

    const finalMidi = {
      header: {
        format: 1,
        numTracks: outputTracks.length + 1,
        ticksPerBeat
      },
      tracks: [finalGlobal, ...outputTracks]
    };

    const bytes = writeMidi(finalMidi);
    const blob = new Blob([new Uint8Array(bytes)], {type:"audio/midi"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.mid";
    a.click();

  } catch (e) {
    console.error(e);
    alert("Error — check console (F12)");
  }
};
</script>

</body>
</html>
