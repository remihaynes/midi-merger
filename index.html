<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIDI Merger (Full Fidelity)</title>
</head>
<body>

<h3>MIDI Merger (Type 1, Full Data)</h3>
<input type="file" id="files" multiple accept=".mid,.midi">
<button onclick="mergeMidi()">Merge & Download</button>

<script src="https://cdn.jsdelivr.net/npm/midi-file@1.2.4/dist/midi-file.min.js"></script>

<script>
async function mergeMidi() {
  const input = document.getElementById("files");
  const files = input.files;

  if (!files.length) {
    alert("Select MIDI files.");
    return;
  }

  const parsedFiles = [];

  // Read all MIDI files
  for (let file of files) {
    const buffer = await file.arrayBuffer();
    const midi = MidiFile.parseMidi(new Uint8Array(buffer));
    parsedFiles.push(midi);
  }

  // Use first file header as base
  const header = {
    format: 1,
    numTracks: 0,
    ticksPerBeat: parsedFiles[0].header.ticksPerBeat
  };

  const outputTracks = [];

  // --- GLOBAL TRACK (tempo, time signature, etc.) ---
  const globalTrack = [];

  parsedFiles.forEach((midi, index) => {
    midi.tracks.forEach((track, tIndex) => {

      const newTrack = [];
      let absoluteTime = 0;

      track.forEach(event => {
        absoluteTime += event.deltaTime;

        // Clone event
        const newEvent = JSON.parse(JSON.stringify(event));

        // Normalize deltaTime later
        newEvent.absoluteTime = absoluteTime;

        // Put global/meta events ONLY in first track
        if (event.meta) {
          if (event.type === "setTempo" ||
              event.type === "timeSignature" ||
              event.type === "keySignature") {
            
            if (index === 0 && tIndex === 0) {
              globalTrack.push(newEvent);
            }
            return;
          }
        }

        newTrack.push(newEvent);
      });

      // Sort + convert back to deltaTime
      newTrack.sort((a, b) => a.absoluteTime - b.absoluteTime);

      let lastTime = 0;
      newTrack.forEach(e => {
        e.deltaTime = e.absoluteTime - lastTime;
        delete e.absoluteTime;
        lastTime += e.deltaTime;
      });

      outputTracks.push(newTrack);
    });
  });

  // Process global track timing
  globalTrack.sort((a, b) => a.absoluteTime - b.absoluteTime);

  let lastTime = 0;
  globalTrack.forEach(e => {
    e.deltaTime = e.absoluteTime - lastTime;
    delete e.absoluteTime;
    lastTime += e.deltaTime;
  });

  // Add endOfTrack events
  outputTracks.forEach(track => {
    track.push({ deltaTime: 0, meta: true, type: "endOfTrack" });
  });

  globalTrack.push({ deltaTime: 0, meta: true, type: "endOfTrack" });

  // Final MIDI structure
  const finalMidi = {
    header: header,
    tracks: [globalTrack, ...outputTracks]
  };

  const bytes = MidiFile.writeMidi(finalMidi);
  const blob = new Blob([new Uint8Array(bytes)], { type: "audio/midi" });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "merged.mid";
  a.click();
}
</script>

</body>
</html>
