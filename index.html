<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MIDI Merger</title>

<style>
  body {
    background-color: #1b140f;
    color: #e6d3b3;
    font-family: "Consolas", monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    height: 100vh;
    margin: 0;
    padding-top: 80px;
    overflow: hidden;
    position: relative;
  }

  /* 🌫️ ANALOG TEXTURE */
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
    opacity: 0.25;
    pointer-events: none;
  }

  h3 {
    color: #f2e6d0;
    margin-bottom: 30px;
    z-index: 2;
  }

  .center-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    z-index: 2;
  }

  input, button {
    font-family: "Consolas", monospace;
    background: #3a2a1f;
    color: #e6d3b3;
    border: 1px solid #5a3e2b;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 15px;
  }

  button {
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #4a3426;
  }

  /* 🌱 BETTER VINES */
  .vine {
    position: absolute;
    width: 150px;
    height: 100%;
    top: 0;
    pointer-events: none;
    z-index: 1;
  }

  .vine.left { left: 0; }
  .vine.right { right: 0; transform: scaleX(-1); }

  .vine span {
    position: absolute;
    width: 8px;
    height: 120px;
    background: linear-gradient(#3cff88, #0c5f2f);
    border-radius: 20px;
    animation: grow 8s linear infinite;
    box-shadow: 0 0 10px rgba(60,255,136,0.3);
  }

  .vine span:nth-child(1) { left: 20px; animation-delay: 0s; }
  .vine span:nth-child(2) { left: 60px; animation-delay: 2s; }
  .vine span:nth-child(3) { left: 100px; animation-delay: 4s; }

  @keyframes grow {
    0% { top: 100%; transform: rotate(0deg); }
    100% { top: -200px; transform: rotate(20deg); }
  }

  /* 🎹 PIANO */
  .piano {
    margin-top: 60px;
    z-index: 2;
    animation: float 4s ease-in-out infinite;
  }

  .piano img {
    width: 200px;
    image-rendering: pixelated;

    /* 🔥 FIX WHITE BACKGROUND */
    mix-blend-mode: multiply;

    /* 🌿 GREEN GLOW */
    filter: drop-shadow(0 0 12px rgba(60,255,136,0.4));
  }

  /* ✨ FLOAT ANIMATION */
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

</style>
</head>

<body>

<div class="vine left">
  <span></span><span></span><span></span>
</div>

<div class="vine right">
  <span></span><span></span><span></span>
</div>

<h3>MIDI Merger</h3>

<div class="center-column">
  <input type="file" id="files" multiple accept=".mid,.midi">
  <button onclick="mergeMidi()">Merge & Download</button>
</div>

<div class="piano">
  <img src="piano.gif" alt="pixel piano">
</div>

<script type="module">
import { parseMidi, writeMidi } from "https://cdn.jsdelivr.net/npm/midi-file@1.2.4/+esm";

window.mergeMidi = async function () {
  try {
    const files = document.getElementById("files").files;
    if (!files.length) {
      alert("Select MIDI files.");
      return;
    }

    const parsed = [];
    const names = [];

    for (let f of files) {
      const buf = await f.arrayBuffer();
      parsed.push(parseMidi(new Uint8Array(buf)));
      names.push(f.name.replace(".mid",""));
    }

    const ticksPerBeat = parsed[0].header.ticksPerBeat;

    const globalTrack = [];
    const outputTracks = [];
    let channel = 0;

    function rebuild(track) {
      track.sort((a,b)=>a.time-b.time);
      let last = 0;
      return track.map(e=>{
        const delta = e.time - last;
        last = e.time;
        delete e.time;
        return {...e, deltaTime: delta};
      });
    }

    parsed.forEach((midi, fileIndex)=>{
      midi.tracks.forEach((track, tIndex)=>{
        let time = 0;
        let newTrack = [];
        let name = null;

        track.forEach(event=>{
          time += event.deltaTime;
          const e = structuredClone(event);

          if (e.meta && e.type === "trackName") name = e.text;

          if (e.meta && (
            e.type === "setTempo" ||
            e.type === "timeSignature" ||
            e.type === "keySignature"
          )) {
            if (fileIndex === 0 && tIndex === 0) {
              globalTrack.push({...e, time});
            }
            return;
          }

          if (e.channel !== undefined) e.channel = channel % 16;
          newTrack.push({...e, time});
        });

        if (!name) name = names[fileIndex] + "_Track_" + (tIndex+1);

        newTrack.push({ time: 0, meta: true, type: "trackName", text: name });

        newTrack = rebuild(newTrack);

        const totalTime = newTrack.reduce((sum, e) => sum + e.deltaTime, 0);
        newTrack.totalTime = totalTime;

        outputTracks.push(newTrack);
        channel++;
      });
    });

    let maxTime = 0;
    outputTracks.forEach(t => { if (t.totalTime > maxTime) maxTime = t.totalTime; });

    outputTracks.forEach(track => {
      const current = track.reduce((sum, e) => sum + e.deltaTime, 0);
      track.push({
        deltaTime: Math.max(0, maxTime - current),
        meta: true,
        type: "endOfTrack"
      });
    });

    const finalGlobal = rebuild(globalTrack);
    finalGlobal.unshift({ deltaTime: 0, meta: true, type: "trackName", text: "Global" });
    finalGlobal.push({ deltaTime: maxTime, meta: true, type: "endOfTrack" });

    const finalMidi = {
      header: { format: 1, numTracks: outputTracks.length + 1, ticksPerBeat },
      tracks: [finalGlobal, ...outputTracks]
    };

    const bytes = writeMidi(finalMidi);
    const blob = new Blob([new Uint8Array(bytes)], {type:"audio/midi"});

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged.mid";
    a.click();

  } catch (e) {
    console.error(e);
    alert("Error — check console (F12)");
  }
};
</script>

</body>
</html>
